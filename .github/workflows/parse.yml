name: Parse Workout Logs

on:
  push:
    paths:
      - 'logs/raw/*.txt'
      - 'scripts/parse_workout.py'
  workflow_dispatch:
    inputs:
      force_reprocess:
        description: 'Reprocess ALL raw files (overwrites existing JSON)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Parse workout logs
        run: |
          if [ "${{ github.event.inputs.force_reprocess }}" = "true" ]; then
            echo "Force reprocessing all files..."
            python scripts/parse_workout.py --force
          else
            python scripts/parse_workout.py
          fi

      - name: Commit parsed JSON
        run: |
          git config user.name "workout-bot"
          git config user.email "bot@workout.local"
          git add logs/json/*.json
          git diff --staged --quiet || git commit -m "auto: parse workout logs"
          git push
